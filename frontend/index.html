<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicNomad | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">LogicNomad</h1>
            <div id="auth-buttons" class="space-x-4">
                <span id="user-display" class="hidden text-gray-400 mr-2"></span>
                <button onclick="toggleModal('login-modal')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Login</button>
                <button onclick="logout()" id="logout-btn" class="hidden bg-red-600 hover:bg-red-700 px-4 py-2 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">Featured Inventory</h2>
            <button onclick="toggleModal('upload-modal')" id="sell-btn" class="hidden bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-bold">List Product</button>
        </div>

        <div id="inventory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="upload-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-xl max-w-md w-full border border-gray-700">
            <h2 class="text-2xl font-bold mb-4">List New Item</h2>
            <form id="upload-form" class="space-y-4">
                <input type="text" name="p_name" placeholder="Product Name" class="w-full p-2 bg-gray-700 rounded border border-gray-600" required>
                <div class="flex space-x-2">
                    <input type="number" name="qty" placeholder="Qty" class="w-1/2 p-2 bg-gray-700 rounded border border-gray-600" required>
                    <input type="number" step="0.01" name="price" placeholder="Price" class="w-1/2 p-2 bg-gray-700 rounded border border-gray-600" required>
                </div>
                <input type="text" name="caption" placeholder="Image Caption" class="w-full p-2 bg-gray-700 rounded border border-gray-600" required>
                <input type="file" name="img" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700" required>
                <div class="flex justify-end space-x-2 mt-6">
                    <button type="button" onclick="toggleModal('upload-modal')" class="text-gray-400 px-4 py-2">Cancel</button>
                    <button type="submit" class="bg-blue-600 px-6 py-2 rounded font-bold">Upload</button>
                </div>
            </form>
        </div>
    </div>

    <div id="login-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-xl max-w-sm w-full border border-gray-700">
            <h2 class="text-2xl font-bold mb-4">Login</h2>
            <form id="login-form" class="space-y-4">
                <input type="text" name="username" placeholder="Email (Username)" class="w-full p-2 bg-gray-700 rounded border border-gray-600" required>
                <input type="password" name="password" placeholder="Password" class="w-full p-2 bg-gray-700 rounded border border-gray-600" required>
                <button type="submit" class="w-full bg-blue-600 py-2 rounded font-bold mt-4">Sign In</button>
                <p class="text-xs text-gray-500 text-center">Farook College CS Project</p>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        // Toggle Modals
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }

        // Fetch Inventory
        async function fetchInventory() {
            const res = await fetch(`${API_BASE}/inventory`);
            const data = await res.json();
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';

            data.forEach(item => {
                // Determine if URL is local or external
                const imgSrc = item.img_caption.img.startsWith('http') 
                    ? item.img_caption.img 
                    : `${API_BASE}${item.img_caption.img}`;

                grid.innerHTML += `
                    <div class="product-card bg-gray-800 rounded-xl overflow-hidden border border-gray-700">
                        <img src="${imgSrc}" alt="${item.p_name}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-xl">${item.p_name}</h3>
                            <p class="text-gray-400 text-sm mb-2">${item.img_caption.caption}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-blue-400 font-bold">$${item.price}</span>
                                <span class="text-xs ${item.qty > 0 ? 'text-green-500' : 'text-red-500'}">Qty: ${item.qty}</span>
                            </div>
                            <button class="w-full mt-4 bg-gray-700 hover:bg-blue-600 py-2 rounded transition-colors">Buy Now</button>
                        </div>
                    </div>
                `;
            });
        }

        // Handle Login (Form data as per OAuth2PasswordRequestForm)
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    body: formData // Sent as application/x-www-form-urlencoded by default for OAuth2
                });
                
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    location.reload();
                } else {
                    alert("Login failed. Check your credentials.");
                }
            } catch (err) { console.error(err); }
        };

        // Handle Product Listing (Multipart/Form-Data)
        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const token = localStorage.getItem('token');

            const res = await fetch(`${API_BASE}/inventory`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (res.ok) {
                toggleModal('upload-modal');
                fetchInventory();
            } else {
                alert("Upload failed. Are you a registered seller?");
            }
        };

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        // Initial Setup
        window.onload = () => {
            fetchInventory();
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('sell-btn').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.querySelector('[onclick="toggleModal(\'login-modal\')"]').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
